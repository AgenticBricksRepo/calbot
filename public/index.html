<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CalBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #08080a;
  --surface: #111114;
  --surface-2: #19191e;
  --border: #252529;
  --amber: #c9a96e;
  --amber-bright: #e8c87a;
  --amber-dim: #8a7548;
  --text: #e8e2d6;
  --text-muted: #7a756a;
  --text-dim: #4a473f;
  --green: #5a9e6f;
  --red: #c0504d;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Outfit', system-ui, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,169,110,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,169,110,0.03) 0%, transparent 50%);
  pointer-events: none;
}

/* ── Shell ──────────────────────────────────────────── */
.shell {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--surface);
}

@media (min-width: 600px) and (min-height: 700px) {
  .shell {
    max-width: 520px;
    max-height: 92vh;
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 24px 80px rgba(0,0,0,0.6),
      0 0 120px rgba(201,169,110,0.03);
  }
}

/* ── Header ─────────────────────────────────────────── */
.header {
  flex-shrink: 0;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  -webkit-safe-area: env(safe-area-inset-top);
  padding-top: max(16px, env(safe-area-inset-top));
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dim) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--bg);
  box-shadow: 0 2px 12px rgba(201,169,110,0.2);
}

.brand h1 {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.brand h1 span { color: var(--amber); }

.clear-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  font-family: var(--sans);
  font-size: 12px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.clear-btn:hover { border-color: var(--amber-dim); color: var(--amber); }

/* ── Messages ───────────────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Message bubbles ────────────────────────────────── */
.msg {
  max-width: 88%;
  animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; }
.msg.bot { align-self: flex-start; }

.msg-bubble {
  padding: 11px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.6;
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dim) 100%);
  color: var(--bg);
  font-weight: 400;
  border-bottom-right-radius: 6px;
}

.msg.bot .msg-bubble {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 6px;
}

.msg-bubble a {
  color: var(--amber-bright);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.msg-bubble a:hover { color: var(--amber); }

.msg-bubble strong { font-weight: 500; }

/* tool badge */
.tool-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 8px;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(201,169,110,0.08);
  border: 1px solid rgba(201,169,110,0.15);
  font-size: 11px;
  font-weight: 500;
  color: var(--amber);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ── Confirmation card ──────────────────────────────── */
.confirm-card {
  align-self: flex-start;
  max-width: 88%;
  animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.confirm-inner {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.confirm-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--amber);
}

.confirm-body {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.confirm-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}

.confirm-detail {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}

.confirm-actions {
  display: flex;
  gap: 8px;
  padding: 10px 16px 14px;
}

.confirm-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.confirm-btn.yes {
  background: linear-gradient(135deg, var(--amber), var(--amber-dim));
  color: var(--bg);
}
.confirm-btn.yes:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,169,110,0.25); }

.confirm-btn.no {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.confirm-btn.no:hover { border-color: var(--red); color: var(--red); }

.confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── Typing indicator ───────────────────────────────── */
.typing {
  align-self: flex-start;
  animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.typing-dots {
  display: flex;
  gap: 5px;
  padding: 14px 20px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 6px;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--amber-dim);
  animation: blink 1.4s infinite both;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Input area ─────────────────────────────────────── */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  resize: none;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px; /* prevents iOS zoom */
  font-weight: 300;
  padding: 12px 16px;
  line-height: 1.5;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.input-row textarea::placeholder { color: var(--text-dim); }
.input-row textarea:focus { border-color: var(--amber-dim); }

.send-btn {
  width: 46px;
  height: 46px;
  flex-shrink: 0;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dim) 100%);
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(201,169,110,0.2);
  -webkit-tap-highlight-color: transparent;
}
.send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,169,110,0.3); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <h1>Cal<span>Bot</span></h1>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Schedule something..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let busy = false;
let history = [];

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || busy;
});

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function formatDateTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  } catch { return iso; }
}

function addMessage(text, role, toolNames) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  let inner = '';
  if (role === 'bot' && toolNames && toolNames.length) {
    const labels = toolNames.map(n => {
      if (n === 'create_calendar_event') return 'Event Created';
      if (n === 'list_upcoming_events') return 'Calendar Checked';
      return n;
    });
    inner += labels.map(l =>
      `<div class="tool-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${l}</div>`
    ).join('');
  }

  inner += formatText(text);
  wrap.innerHTML = `<div class="msg-bubble">${inner}</div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function addStreamingBubble() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = '<div class="msg-bubble"></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap.querySelector('.msg-bubble');
}

function addConfirmCard(event, toolCall, cardHistory) {
  const card = document.createElement('div');
  card.className = 'confirm-card';

  const startStr = formatDateTime(event.start_datetime);
  const endStr = formatDateTime(event.end_datetime);

  card.innerHTML = `
    <div class="confirm-inner">
      <div class="confirm-header">Add to calendar?</div>
      <div class="confirm-body">
        <div class="confirm-title">${event.summary}</div>
        <div class="confirm-detail">${startStr} — ${endStr}</div>
        ${event.location ? `<div class="confirm-detail">${event.location}</div>` : ''}
        ${event.description ? `<div class="confirm-detail" style="color:var(--text-dim);font-style:italic">${event.description}</div>` : ''}
      </div>
      <div class="confirm-actions">
        <button class="confirm-btn yes" onclick="confirmEvent(this)">Create</button>
        <button class="confirm-btn no" onclick="rejectEvent(this)">Cancel</button>
      </div>
    </div>`;

  card.dataset.toolCall = JSON.stringify(toolCall);
  card.dataset.history = JSON.stringify(cardHistory);
  messagesEl.appendChild(card);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function streamResponse(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let bubble = null;
  let bubbleText = '';
  let toolBadges = [];

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = JSON.parse(line.slice(6));

      if (data.type === 'token') {
        if (!bubble) bubble = addStreamingBubble();
        bubbleText += data.content;
        bubble.innerHTML = (toolBadges.length ? toolBadges.join('') : '') + formatText(bubbleText);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      if (data.type === 'tool_used') {
        const label = data.name === 'create_calendar_event' ? 'Event Created'
                    : data.name === 'list_upcoming_events' ? 'Calendar Checked' : data.name;
        const badge = `<div class="tool-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${label}</div>`;
        toolBadges.push(badge);
        if (bubble) bubble.innerHTML = toolBadges.join('') + formatText(bubbleText);
      }

      if (data.type === 'confirm') {
        addConfirmCard(data.event, data.tool_call, data.history);
      }

      if (data.type === 'done') {
        history = data.history;
      }
    }
  }
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage(text, 'user');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });
    await streamResponse(res);
  } catch (err) {
    addMessage('Connection error. Is the server running?', 'bot');
  }

  busy = false;
  sendBtn.disabled = !inputEl.value.trim();
  inputEl.focus();
}

async function confirmEvent(btn) {
  const card = btn.closest('.confirm-card');
  const toolCall = JSON.parse(card.dataset.toolCall);
  const cardHistory = JSON.parse(card.dataset.history);

  // Disable buttons
  card.querySelectorAll('.confirm-btn').forEach(b => b.disabled = true);
  btn.textContent = 'Creating...';

  busy = true;
  try {
    const res = await fetch('/api/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tool_call: toolCall, history: cardHistory }),
    });
    await streamResponse(res);
  } catch (err) {
    addMessage('Failed to create event.', 'bot');
  }
  busy = false;
  sendBtn.disabled = !inputEl.value.trim();

  // Collapse the card
  card.style.opacity = '0.5';
  card.querySelectorAll('.confirm-btn').forEach(b => b.style.display = 'none');
  btn.style.display = 'none';
}

async function rejectEvent(btn) {
  const card = btn.closest('.confirm-card');
  const toolCall = JSON.parse(card.dataset.toolCall);
  const cardHistory = JSON.parse(card.dataset.history);

  card.querySelectorAll('.confirm-btn').forEach(b => b.disabled = true);

  busy = true;
  try {
    const res = await fetch('/api/reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tool_call: toolCall, history: cardHistory }),
    });
    await streamResponse(res);
  } catch (err) {
    addMessage('Something went wrong.', 'bot');
  }
  busy = false;
  sendBtn.disabled = !inputEl.value.trim();

  card.style.opacity = '0.5';
  card.querySelectorAll('.confirm-actions').forEach(a => a.style.display = 'none');
}

function clearChat() {
  history = [];
  messagesEl.innerHTML = '';
}

inputEl.focus();
</script>
</body>
</html>
